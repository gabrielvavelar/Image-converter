<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <span class="logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          Image Converter
        </span>
        <span class="badge">PNG · JPEG · WEBP</span>
      </div>
    </header>

    <!-- Main card -->
    <main class="main">
      <div class="card">

        <!-- Drop zone -->
        <div class="drop-zone" id="dropZone">
          <div class="drop-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="drop-title">Drag & drop your image here</p>
          <p class="drop-sub">or click to browse files</p>
          <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden />
          <div class="file-preview hidden" id="filePreview">
            <img id="previewImg" src="" alt="preview" />
            <span id="fileName"></span>
            <button class="btn-clear" id="clearFile" title="Remove file">✕</button>
          </div>
        </div>

        <!-- Format selectors -->
        <div class="formats">
          <div class="format-group">
            <label for="sourceFormat">From</label>
            <select id="sourceFormat">
              <option value="">-- select --</option>
              <option value="PNG">PNG</option>
              <option value="JPEG">JPEG</option>
              <option value="WEBP">WEBP</option>
            </select>
          </div>

          <div class="arrow-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </div>

          <div class="format-group">
            <label for="targetFormat">To</label>
            <select id="targetFormat">
              <option value="">-- select --</option>
              <option value="PNG">PNG</option>
              <option value="JPEG">JPEG</option>
              <option value="WEBP">WEBP</option>
            </select>
          </div>
        </div>

        <!-- Error message -->
        <p class="error-msg hidden" id="errorMsg"></p>

        <!-- Convert button -->
        <button class="btn-convert" id="convertBtn">Convert Image</button>

        <!-- Status / result section -->
        <div class="result-section hidden" id="resultSection">
          <div class="status-row">
            <span class="status-label">Status:</span>
            <span class="status-badge" id="statusBadge">—</span>
          </div>

          <div class="progress-bar-wrap hidden" id="progressWrap">
            <div class="progress-bar" id="progressBar"></div>
          </div>

          <button class="btn-download hidden" id="downloadBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download Converted Image
          </button>
        </div>

      </div>
    </main>

    <footer class="footer">
      Made by <a href="https://github.com/gabrielvavelar" target="_blank">Gabriel Venancio de Avelar</a>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
